name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/mathkids_adventure.keystore

      - name: Get dependencies
        run: flutter pub get

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "keystoreFile=android/app/mathkids_adventure.keystore" >> gradle.properties
          echo "keystorePassword=$KEYSTORE_PASSWORD" >> gradle.properties
          echo "keyAlias=$KEY_ALIAS" >> gradle.properties
          echo "keyPassword=$KEY_PASSWORD" >> gradle.properties
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
