# GitHub Actions - Flutter Build & Deploy

name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Show Flutter version
        run: flutter --version

      - name: Run flutter pub get with verbose
        run: flutter pub get --verbose 2>&1 || true

      - name: Build Flutter Web
        run: flutter build web --release || echo "Build failed - checking logs"

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: flutter-build
          path: build/web
